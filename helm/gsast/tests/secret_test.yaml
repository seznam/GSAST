suite: App Secret
templates:
  - gsast-secret.yaml

tests:
  # ── Gate: suppressed when existingSecret is set ────────────────────────────
  - it: does not render when existingSecret is configured
    set:
      existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0

  # ── Basic rendering ────────────────────────────────────────────────────────
  - it: renders a Secret when existingSecret is null
    asserts:
      - isKind:
          of: Secret
      - hasDocuments:
          count: 1

  - it: sets the correct secret name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-gsast-secret

  - it: is of type Opaque
    asserts:
      - equal:
          path: type
          value: Opaque

  # ── Required keys ──────────────────────────────────────────────────────────
  - it: contains API_SECRET_KEY
    asserts:
      - exists:
          path: stringData.API_SECRET_KEY

  - it: contains GITHUB_API_TOKEN
    asserts:
      - exists:
          path: stringData.GITHUB_API_TOKEN

  - it: contains GITLAB_URL
    asserts:
      - exists:
          path: stringData.GITLAB_URL

  - it: contains GITLAB_API_TOKEN
    asserts:
      - exists:
          path: stringData.GITLAB_API_TOKEN

  # ── Redis URL conditional inclusion ────────────────────────────────────────
  - it: does not include REDIS_URL when redis is enabled (it is built dynamically)
    set:
      redis.enabled: true
    asserts:
      - notExists:
          path: stringData.REDIS_URL

  - it: includes REDIS_URL when redis is disabled (external Redis)
    set:
      redis.enabled: false
    asserts:
      - exists:
          path: stringData.REDIS_URL

  - it: populates REDIS_URL from secrets.redisUrl when redis is disabled
    set:
      redis.enabled: false
      secrets.redisUrl: "redis://:s3cr3t@external-redis.example.com:6379"
    asserts:
      - equal:
          path: stringData.REDIS_URL
          value: "redis://:s3cr3t@external-redis.example.com:6379"

  # ── Value propagation ──────────────────────────────────────────────────────
  - it: writes secrets.apiSecretKey into API_SECRET_KEY
    set:
      secrets.apiSecretKey: "my-api-key"
    asserts:
      - equal:
          path: stringData.API_SECRET_KEY
          value: "my-api-key"

  - it: writes secrets.gitlabUrl into GITLAB_URL
    set:
      secrets.gitlabUrl: "https://gitlab.internal.example.com"
    asserts:
      - equal:
          path: stringData.GITLAB_URL
          value: "https://gitlab.internal.example.com"

  - it: writes secrets.gitlabApiToken into GITLAB_API_TOKEN
    set:
      secrets.gitlabApiToken: "glpat-token"
    asserts:
      - equal:
          path: stringData.GITLAB_API_TOKEN
          value: "glpat-token"

  - it: writes secrets.githubToken into GITHUB_API_TOKEN
    set:
      secrets.githubToken: "ghp_token"
    asserts:
      - equal:
          path: stringData.GITHUB_API_TOKEN
          value: "ghp_token"

  # ── Helm labels ────────────────────────────────────────────────────────────
  - it: carries standard Helm managed-by label
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
