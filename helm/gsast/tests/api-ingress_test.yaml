suite: API Ingress
templates:
  - gsast-api-ingress.yaml

tests:
  # ── Gate: disabled by default ──────────────────────────────────────────────
  - it: does not render when api.ingress.enabled is false
    asserts:
      - hasDocuments:
          count: 0

  # ── Basic rendering ────────────────────────────────────────────────────────
  - it: renders an Ingress when enabled
    set:
      api.ingress.enabled: true
    asserts:
      - isKind:
          of: Ingress
      - hasDocuments:
          count: 1

  - it: sets the correct ingress name
    set:
      api.ingress.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-gsast-api

  # ── Hosts and paths ────────────────────────────────────────────────────────
  - it: generates a rule for each configured host
    set:
      api.ingress.enabled: true
      api.ingress.hosts:
        - host: gsast.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: spec.rules[0].host
          value: gsast.example.com
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix

  - it: routes to the API service on the configured service port
    set:
      api.ingress.enabled: true
      api.service.port: 5000
      api.ingress.hosts:
        - host: gsast.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: RELEASE-NAME-gsast-api
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 5000

  - it: backend port follows api.service.port override
    set:
      api.ingress.enabled: true
      api.service.port: 8080
      api.ingress.hosts:
        - host: gsast.example.com
          paths:
            - path: /api
              pathType: Prefix
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8080

  # ── ingressClassName ───────────────────────────────────────────────────────
  - it: does not set ingressClassName when not configured
    set:
      api.ingress.enabled: true
    asserts:
      - notExists:
          path: spec.ingressClassName

  - it: sets ingressClassName when provided
    set:
      api.ingress.enabled: true
      api.ingress.className: nginx
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  # ── Annotations ────────────────────────────────────────────────────────────
  - it: adds annotations when configured
    set:
      api.ingress.enabled: true
      api.ingress.annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/rewrite-target"]
          value: /
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/ssl-redirect"]
          value: "true"

  # ── TLS ────────────────────────────────────────────────────────────────────
  - it: does not set TLS when not configured
    set:
      api.ingress.enabled: true
    asserts:
      - notExists:
          path: spec.tls

  - it: configures TLS when tls block is provided
    set:
      api.ingress.enabled: true
      api.ingress.tls:
        - secretName: gsast-tls
          hosts:
            - gsast.example.com
    asserts:
      - equal:
          path: spec.tls[0].secretName
          value: gsast-tls
      - contains:
          path: spec.tls[0].hosts
          content: gsast.example.com

  # ── Helm labels ────────────────────────────────────────────────────────────
  - it: carries standard Helm managed-by label
    set:
      api.ingress.enabled: true
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
