suite: Worker Deployment
templates:
  - gsast-worker-deployment.yaml

tests:
  # ── Basic rendering ────────────────────────────────────────────────────────
  - it: renders a Deployment
    asserts:
      - isKind:
          of: Deployment
      - hasDocuments:
          count: 1

  - it: sets the correct deployment name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-gsast-worker

  - it: sets the worker container name
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: worker

  - it: uses the global image by default
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: gsast:latest

  - it: uses the configured pull policy
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent

  - it: runs the worker python command
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - python3
            - /app/gsast/worker.py

  - it: labels the pod with component gsast-worker
    asserts:
      - equal:
          path: spec.template.metadata.labels.component
          value: gsast-worker

  - it: has terminationGracePeriodSeconds set to 120 for in-flight scan completion
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 120

  - it: sets default replica count to 1
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: respects custom worker.replicaCount
    set:
      worker.replicaCount: 4
    asserts:
      - equal:
          path: spec.replicas
          value: 4

  - it: uses RollingUpdate strategy
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate

  # ── Secret references ──────────────────────────────────────────────────────
  - it: reads GITLAB_API_TOKEN from the generated secret by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GITLAB_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-gsast-secret
                key: GITLAB_API_TOKEN

  - it: reads secrets from existingSecret when set
    set:
      existingSecret: my-external-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GITLAB_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-external-secret
                key: GITLAB_API_TOKEN

  # ── Redis environment injection ────────────────────────────────────────────
  - it: injects inline REDIS_URL when redis is enabled
    set:
      redis.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_URL
            value: "redis://:$(REDIS_PASSWORD)@RELEASE-NAME-gsast-redis-master:6379"

  - it: reads REDIS_URL from secret when redis is disabled
    set:
      redis.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_URL
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-gsast-secret
                key: REDIS_URL

  # ── Custom GitLab CA ───────────────────────────────────────────────────────
  - it: does not add CA volume when customGitlabCA is disabled
    asserts:
      - notExists:
          path: spec.template.spec.volumes

  - it: mounts the CA ConfigMap volume when customGitlabCA is enabled
    set:
      environment.customGitlabCA.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: custom-gitlab-ca
            configMap:
              name: gsast-ca
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: custom-gitlab-ca
            mountPath: /ca/

  - it: sets GIT_SSL_CAINFO env var when customGitlabCA is enabled
    set:
      environment.customGitlabCA.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GIT_SSL_CAINFO
            value: /ca/gitlab_ca.crt

  # ── Internal mode ──────────────────────────────────────────────────────────
  - it: does not add pod annotations when internal is disabled
    asserts:
      - notExists:
          path: spec.template.metadata.annotations

  - it: adds pod annotations when internal is enabled and annotations are set
    set:
      internal.enabled: true
      internal.podAnnotations:
        sidecar.istio.io/inject: "false"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["sidecar.istio.io/inject"]
          value: "false"

  # ── Resource limits ────────────────────────────────────────────────────────
  - it: applies default CPU and memory limits
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 3000m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 6000Mi

  - it: respects custom resource overrides
    set:
      worker.resources:
        limits:
          cpu: 2000m
          memory: 4Gi
        requests:
          cpu: 500m
          memory: 1Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 2000m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 1Gi

  # ── Helm labels ────────────────────────────────────────────────────────────
  - it: carries app.kubernetes.io/instance label on pod template
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: carries standard Helm managed-by label
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
